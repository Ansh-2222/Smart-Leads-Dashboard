version: '3.9'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: smartleads-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: smartleads
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - smartleads-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartleads-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/smartleads
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_in_prod}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      CORS_ORIGIN: http://localhost
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    networks:
      - smartleads-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartleads-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - smartleads-network

volumes:
  mongo_data:

networks:
  smartleads-network:
    driver: bridge
